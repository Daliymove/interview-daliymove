<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>简历分析报告</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        body {
            font-family: ZhuqueFangsong;
            font-size: 12pt;
            line-height: 1.6;
            color: #333;
            padding: 20px;
        }
        .header {
            text-align: center;
            padding-bottom: 20px;
            border-bottom: 2px solid #4A90E2;
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: 24pt;
            color: #4A90E2;
            margin-bottom: 8px;
        }
        .header .subtitle {
            font-size: 12pt;
            color: #666;
        }
        .section {
            margin-bottom: 20px;
        }
        .section-title {
            font-size: 16pt;
            color: #4A90E2;
            padding-bottom: 8px;
            border-bottom: 1px solid #ddd;
            margin-bottom: 12px;
        }
        .score-card {
            background: #f5f5f5;
            padding: 15px;
            margin-bottom: 15px;
        }
        .overall-score {
            text-align: center;
            margin-bottom: 15px;
        }
        .overall-score .score-value {
            font-size: 36pt;
            font-weight: bold;
            color: #4A90E2;
        }
        .overall-score .score-label {
            font-size: 12pt;
            color: #666;
        }
        .score-table {
            width: 100%;
            border-collapse: collapse;
        }
        .score-table td {
            padding: 8px 10px;
            background: #fff;
            border: 1px solid #e0e0e0;
        }
        .score-table .label {
            color: #666;
            width: 50%;
        }
        .score-table .value {
            font-weight: bold;
            color: #333;
            text-align: right;
        }
        .summary {
            background: #f0f7ff;
            padding: 15px;
            font-size: 12pt;
            line-height: 1.8;
        }
        .strengths-table {
            width: 100%;
            border-collapse: collapse;
        }
        .strengths-table td {
            padding: 10px;
            background: #e8f5e9;
            border: 1px solid #c8e6c9;
        }
        .suggestions-table {
            width: 100%;
            border-collapse: collapse;
        }
        .suggestions-table td {
            padding: 12px;
            background: #fff3e0;
            border: 1px solid #ffe0b2;
            border-left: 4px solid #ff9800;
        }
        .suggestions-table .priority-high {
            color: #c62828;
            font-size: 10pt;
        }
        .suggestions-table .priority-medium {
            color: #f57c00;
            font-size: 10pt;
        }
        .suggestions-table .priority-low {
            color: #1976d2;
            font-size: 10pt;
        }
        .suggestions-table .issue {
            font-weight: bold;
            margin-bottom: 4px;
        }
        .suggestions-table .recommendation {
            color: #666;
        }
        .footer {
            text-align: center;
            padding-top: 20px;
            border-top: 1px solid #ddd;
            margin-top: 20px;
            font-size: 10pt;
            color: #999;
        }
        .info-table {
            width: 100%;
        }
        .info-table td {
            padding: 6px 0;
        }
        .info-table .label {
            color: #666;
        }
        .info-table .value {
            color: #333;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>简历分析报告</h1>
        <div class="subtitle" th:text="${resume.originalFilename}">文件名</div>
    </div>

    <div class="section">
        <div class="section-title">基本信息</div>
        <table class="info-table">
            <tr>
                <td class="label">文件名称：</td>
                <td class="value" th:text="${resume.originalFilename}">-</td>
            </tr>
            <tr>
                <td class="label">上传时间：</td>
                <td class="value" th:text="${#temporals.format(resume.uploadedAt, 'yyyy-MM-dd HH:mm:ss')}">-</td>
            </tr>
        </table>
    </div>

    <div class="section">
        <div class="section-title">综合评分</div>
        <div class="score-card">
            <div class="overall-score">
                <div class="score-value" th:text="${analysis.overallScore}">0</div>
                <div class="score-label">总分 / 100</div>
            </div>
            <table class="score-table">
                <tr>
                    <td class="label">项目经验</td>
                    <td class="value" th:text="${scoreDetail.projectScore + ' / 40'}">0 / 40</td>
                </tr>
                <tr>
                    <td class="label">技能匹配</td>
                    <td class="value" th:text="${scoreDetail.skillMatchScore + ' / 20'}">0 / 20</td>
                </tr>
                <tr>
                    <td class="label">内容完整性</td>
                    <td class="value" th:text="${scoreDetail.contentScore + ' / 15'}">0 / 15</td>
                </tr>
                <tr>
                    <td class="label">结构清晰度</td>
                    <td class="value" th:text="${scoreDetail.structureScore + ' / 15'}">0 / 15</td>
                </tr>
                <tr>
                    <td class="label">表达专业性</td>
                    <td class="value" th:text="${scoreDetail.expressionScore + ' / 10'}">0 / 10</td>
                </tr>
            </table>
        </div>
    </div>

    <div class="section">
        <div class="section-title">核心评价</div>
        <div class="summary" th:text="${analysis.summary}">-</div>
    </div>

    <div class="section">
        <div class="section-title">优势亮点</div>
        <table class="strengths-table">
            <tr th:each="strength, stat : ${strengths}">
                <td th:text="${(stat.count) + '. ' + strength}">-</td>
            </tr>
        </table>
    </div>

    <div class="section">
        <div class="section-title">改进建议</div>
        <table class="suggestions-table">
            <tr th:each="suggestion : ${suggestions}">
                <td>
                    <div th:class="${'priority-' + suggestion.priority.toLowerCase()}" th:text="${suggestion.priority + '优先'}">中优先</div>
                    <div class="issue" th:text="${'【' + suggestion.category + '】' + suggestion.issue}">-</div>
                    <div class="recommendation" th:text="${'建议：' + suggestion.recommendation}">-</div>
                </td>
            </tr>
        </table>
    </div>

    <div class="footer">
        <p>本报告由 AI 智能分析生成，仅供参考</p>
        <p th:text="${'生成时间：' + #temporals.format(#temporals.createNow(), 'yyyy-MM-dd HH:mm:ss')}">生成时间</p>
    </div>
</body>
</html>
